<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>饮食卡路里记录</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text2: #6b6b68;
    --text3: #9a9994;
    --accent: #1d9e75;
    --accent-light: #e1f5ee;
    --accent-dark: #0f6e56;
    --danger: #e24b4a;
    --danger-light: #fcebeb;
    --warn: #ba7517;
    --warn-light: #faeeda;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f0ede6;
      --text2: #a8a59e;
      --text3: #6b6b68;
      --accent: #5dcaa5;
      --accent-light: #04342c;
      --accent-dark: #9fe1cb;
      --danger: #f09595;
      --danger-light: #501313;
      --warn: #ef9f27;
      --warn-light: #412402;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* Header */
  .header { padding: 20px 16px 12px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 500; }
  .date-btn { font-size: 13px; color: var(--text2); background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer; }

  /* Setup / API key banner */
  .setup-banner { margin: 0 16px 16px; background: var(--warn-light); border: 0.5px solid var(--warn); border-radius: var(--radius); padding: 14px 16px; }
  .setup-banner p { font-size: 13px; color: var(--warn); margin-bottom: 10px; }
  .setup-banner .row { display: flex; gap: 8px; }
  .setup-banner input { flex: 1; font-size: 13px; padding: 7px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); }
  .setup-banner button { font-size: 13px; padding: 7px 14px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; cursor: pointer; white-space: nowrap; }

  /* Ring + today stats */
  .today-card { margin: 0 16px 16px; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 20px 16px; }
  .ring-row { display: flex; align-items: center; gap: 20px; }
  .ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .ring-wrap canvas { width: 110px !important; height: 110px !important; }
  .ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .ring-center .kcal { font-size: 22px; font-weight: 500; }
  .ring-center .label { font-size: 11px; color: var(--text3); }
  .stats-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; }
  .stat-row .name { font-size: 13px; color: var(--text2); }
  .stat-row .val { font-size: 14px; font-weight: 500; }
  .goal-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .goal-row span { font-size: 13px; color: var(--text2); }
  .goal-edit { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; }

  /* Alert */
  .alert { margin: 0 16px 12px; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
  .alert.warn { background: var(--warn-light); color: var(--warn); border: 0.5px solid var(--warn); }
  .alert.danger { background: var(--danger-light); color: var(--danger); border: 0.5px solid var(--danger); }

  /* Section */
  .section-title { padding: 4px 16px 8px; font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: 0.03em; text-transform: uppercase; }

  /* Meal list */
  .meals { margin: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
  .meal-card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .meal-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; }
  .meal-name { font-size: 14px; font-weight: 500; }
  .meal-kcal { font-size: 13px; color: var(--accent); font-weight: 500; }
  .meal-thumb { width: 100%; max-height: 140px; object-fit: cover; display: block; }
  .meal-items { padding: 4px 14px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .food-tag { font-size: 12px; background: var(--surface2); border-radius: 20px; padding: 3px 10px; color: var(--text2); }
  .del-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 4px; }

  /* Add button */
  .add-fab { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; border: none; border-radius: 50px; padding: 14px 28px; font-size: 15px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 16px rgba(29,158,117,0.35); white-space: nowrap; }

  /* Chart card */
  .chart-card { margin: 0 16px 16px; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 16px; }
  .chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--text2); }
  .chart-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .chart-tab { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); }
  .chart-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Pie */
  .pie-wrap { display: flex; align-items: center; gap: 16px; }
  .pie-wrap canvas { max-width: 120px; max-height: 120px; }
  .pie-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }

  /* Modal overlay */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px 16px 36px; width: 100%; max-width: 480px; }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 16px; }
  .modal label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea { width: 100%; font-size: 14px; padding: 9px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
  .modal textarea { height: 60px; resize: none; }
  .upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 20px; text-align: center; cursor: pointer; margin-top: 12px; color: var(--text2); font-size: 13px; }
  .upload-zone img { max-height: 120px; max-width: 100%; border-radius: var(--radius-sm); margin-top: 8px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel { flex: 1; padding: 11px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: none; color: var(--text); cursor: pointer; font-size: 14px; }
  .btn-submit { flex: 2; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-submit:disabled { opacity: 0.5; }
  .analyzing { font-size: 12px; color: var(--text3); text-align: center; padding: 8px 0; display: none; }

  /* Goal modal */
  .goal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
  .goal-overlay.open { display: flex; }
  .goal-modal { background: var(--surface); border-radius: var(--radius); padding: 20px 16px; width: calc(100% - 40px); max-width: 320px; }
  .goal-modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>饮食记录</h1>
    <button class="date-btn" id="dateBtn"></button>
  </div>

  <!-- API Key Banner -->
  <div class="setup-banner" id="setupBanner">
    <p>需要 Google Gemini API Key 才能用 AI 识别食物（免费）。<a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--warn);text-decoration:underline">点击获取</a></p>
    <div class="row">
      <input type="password" id="apiKeyInput" placeholder="粘贴 Gemini API Key..." />
      <button onclick="saveApiKey()">保存</button>
    </div>
  </div>

  <!-- Alert -->
  <div class="alert" id="alertBox"></div>

  <!-- Today Ring -->
  <div class="today-card">
    <div class="ring-row">
      <div class="ring-wrap"><canvas id="ringChart"></canvas>
        <div class="ring-center"><div class="kcal" id="todayKcal">0</div><div class="label">kcal</div></div>
      </div>
      <div class="stats-col">
        <div class="stat-row"><span class="name">早餐</span><span class="val" id="meal0Kcal">— kcal</span></div>
        <div class="stat-row"><span class="name">午餐</span><span class="val" id="meal1Kcal">— kcal</span></div>
        <div class="stat-row"><span class="name">晚餐</span><span class="val" id="meal2Kcal">— kcal</span></div>
        <div class="stat-row"><span class="name">加餐</span><span class="val" id="meal3Kcal">— kcal</span></div>
      </div>
    </div>
    <div class="goal-row">
      <span>目标 <strong id="goalDisplay">1500</strong> kcal</span>
      <a class="goal-edit" onclick="openGoalModal()">修改目标</a>
    </div>
  </div>

  <!-- Meals -->
  <div class="section-title">今日餐食</div>
  <div class="meals" id="mealList"></div>

  <!-- Charts -->
  <div class="section-title">趋势分析</div>
  <div class="chart-card">
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchChart('week',this)">本周</button>
      <button class="chart-tab" onclick="switchChart('month',this)">本月</button>
    </div>
    <canvas id="trendChart" height="140"></canvas>
  </div>

  <div class="chart-card">
    <h3>今日食物占比</h3>
    <div class="pie-wrap">
      <canvas id="pieChart" width="120" height="120"></canvas>
      <div class="pie-legend" id="pieLegend"></div>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="add-fab" onclick="openAddModal()">+ 记录餐食</button>

<!-- Add Meal Modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <h2>记录餐食</h2>
    <label>餐次</label>
    <select id="mealType">
      <option value="早餐">早餐</option>
      <option value="午餐">午餐</option>
      <option value="晚餐">晚餐</option>
      <option value="加餐">加餐</option>
    </select>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imgInput').click()">
      <div id="uploadHint">点击上传食物照片（AI 自动识别）</div>
      <img id="previewImg" style="display:none" />
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">
    <label>食物（逗号分隔，可手动填写）</label>
    <input type="text" id="foodItems" placeholder="如：米饭, 鸡腿, 青菜" />
    <label>卡路里 (kcal)</label>
    <input type="number" id="kcalInput" placeholder="如：650" />
    <div class="analyzing" id="analyzing">AI 识别中，请稍候...</div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-submit" id="submitBtn" onclick="submitMeal()">保存</button>
    </div>
  </div>
</div>

<!-- Goal Modal -->
<div class="goal-overlay" id="goalOverlay">
  <div class="goal-modal">
    <h2>修改每日目标</h2>
    <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:6px">目标卡路里 (kcal)</label>
    <input type="number" id="goalInput" value="1500" style="width:100%;font-size:16px;padding:10px 12px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text)" />
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-cancel" onclick="closeGoalModal()">取消</button>
      <button class="btn-submit" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('gemini_key') || '';
let goal = parseInt(localStorage.getItem('calorie_goal') || '1500');
let records = JSON.parse(localStorage.getItem('calorie_records') || '[]');
let currentImgBase64 = null;
let ringChartInst = null, trendChartInst = null, pieChartInst = null;

// ── Init ──
function todayStr() { return new Date().toISOString().slice(0,10); }
function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'short'});
}

document.getElementById('dateBtn').textContent = formatDate(todayStr());

if (apiKey) document.getElementById('setupBanner').style.display = 'none';

function saveApiKey() {
  const v = document.getElementById('apiKeyInput').value.trim();
  if (!v) { alert('请粘贴 API Key'); return; }
  apiKey = v;
  localStorage.setItem('gemini_key', v);
  document.getElementById('setupBanner').style.display = 'none';
  alert('API Key 已保存！现在上传照片即可自动识别食物。');
}

function openGoalModal() {
  document.getElementById('goalInput').value = goal;
  document.getElementById('goalOverlay').classList.add('open');
}
function closeGoalModal() { document.getElementById('goalOverlay').classList.remove('open'); }
function saveGoal() {
  const v = parseInt(document.getElementById('goalInput').value);
  if (v > 0) { goal = v; localStorage.setItem('calorie_goal', v); }
  closeGoalModal();
  render();
}

// ── Today data ──
function todayRecords() { return records.filter(r => r.date === todayStr()); }
function mealTypeKcal(type) {
  return todayRecords().filter(r => r.mealType === type).reduce((s,r) => s + r.kcal, 0);
}
function todayTotal() { return todayRecords().reduce((s,r) => s + r.kcal, 0); }

// ── Render ──
function render() {
  const total = todayTotal();
  const remaining = goal - total;
  document.getElementById('todayKcal').textContent = total;
  document.getElementById('goalDisplay').textContent = goal;

  const mTypes = ['早餐','午餐','晚餐','加餐'];
  const mIds = ['meal0Kcal','meal1Kcal','meal2Kcal','meal3Kcal'];
  mTypes.forEach((t,i) => {
    const k = mealTypeKcal(t);
    document.getElementById(mIds[i]).textContent = k ? k + ' kcal' : '—';
  });

  // Alert
  const alertBox = document.getElementById('alertBox');
  if (total > goal) {
    alertBox.className = 'alert danger'; alertBox.style.display = 'block';
    alertBox.textContent = '今日卡路里已超标 ' + (total - goal) + ' kcal！';
  } else if (total > goal * 0.9) {
    alertBox.className = 'alert warn'; alertBox.style.display = 'block';
    alertBox.textContent = '今日卡路里接近目标，还剩 ' + remaining + ' kcal。';
  } else {
    alertBox.style.display = 'none';
  }

  renderRing(total, goal);
  renderMealList();
  renderPie();
  renderTrend('week');
}

function renderRing(total, goal) {
  const pct = Math.min(total / goal, 1);
  const rem = 1 - pct;
  const color = total > goal ? '#e24b4a' : total > goal * 0.9 ? '#ba7517' : '#1d9e75';
  const ctx = document.getElementById('ringChart').getContext('2d');
  if (ringChartInst) ringChartInst.destroy();
  ringChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { datasets: [{ data: [pct, rem], backgroundColor: [color, 'rgba(128,128,128,0.1)'], borderWidth: 0, borderRadius: 4 }] },
    options: { cutout: '72%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 400 } }
  });
}

function renderMealList() {
  const list = document.getElementById('mealList');
  const today = todayRecords().slice().reverse();
  if (!today.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">还没有记录，点击下方按钮开始</div>';
    return;
  }
  list.innerHTML = today.map((r,i) => `
    <div class="meal-card">
      ${r.imgUrl ? `<img class="meal-thumb" src="${r.imgUrl}" />` : ''}
      <div class="meal-header">
        <span class="meal-name">${r.mealType}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="meal-kcal">${r.kcal} kcal</span>
          <button class="del-btn" onclick="deleteMeal('${r.id}')">×</button>
        </div>
      </div>
      <div class="meal-items">${r.foods.map(f => `<span class="food-tag">${f}</span>`).join('')}</div>
    </div>
  `).join('');
}

function deleteMeal(id) {
  records = records.filter(r => r.id !== id);
  localStorage.setItem('calorie_records', JSON.stringify(records));
  render();
}

function renderPie() {
  const today = todayRecords();
  const legend = document.getElementById('pieLegend');
  if (!today.length) {
    legend.innerHTML = '<div style="font-size:13px;color:var(--text3)">暂无数据</div>';
    if (pieChartInst) { pieChartInst.destroy(); pieChartInst = null; }
    document.getElementById('pieChart').style.display = 'none';
    return;
  }
  document.getElementById('pieChart').style.display = 'block';
  const foodMap = {};
  today.forEach(r => r.foods.forEach(f => { foodMap[f] = (foodMap[f]||0) + Math.round(r.kcal / r.foods.length); }));
  const labels = Object.keys(foodMap);
  const vals = labels.map(k => foodMap[k]);
  const total = vals.reduce((a,b)=>a+b,0);
  const palette = ['#1d9e75','#378add','#d85a30','#7f77dd','#ba7517','#639922','#d4537e','#888780'];
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChartInst) pieChartInst.destroy();
  pieChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: palette.slice(0,labels.length), borderWidth: 0 }] },
    options: { cutout: '55%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 300 } }
  });
  legend.innerHTML = labels.slice(0,6).map((l,i) => `
    <div class="legend-item">
      <div><span class="legend-dot" style="background:${palette[i]}"></span>${l}</div>
      <span style="color:var(--text2)">${Math.round(vals[i]/total*100)}%</span>
    </div>`).join('');
}

function renderTrend(mode) {
  const days = mode === 'week' ? 7 : 30;
  const labels = [], data = [];
  for (let i = days-1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    labels.push(mode === 'week' ? ['日','一','二','三','四','五','六'][d.getDay()] : (d.getDate()+'日'));
    data.push(records.filter(r=>r.date===ds).reduce((s,r)=>s+r.kcal,0));
  }
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChartInst) trendChartInst.destroy();
  trendChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '卡路里', data, backgroundColor: data.map(v => v > goal ? '#e24b4a' : '#1d9e75'), borderRadius: 4, borderSkipped: false },
        { label: '目标', data: Array(days).fill(goal), type: 'line', borderColor: '#ba7517', borderDash: [4,3], borderWidth: 1.5, pointRadius: 0, fill: false }
      ]
    },
    options: {
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.raw + ' kcal' } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#888' } },
        y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { font: { size: 11 }, color: '#888', callback: v => v + '' } }
      },
      animation: { duration: 300 }
    }
  });
}

function switchChart(mode, el) {
  document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTrend(mode);
}

// ── Add Modal ──
function openAddModal() {
  document.getElementById('addOverlay').classList.add('open');
  document.getElementById('previewImg').style.display = 'none';
  document.getElementById('uploadHint').style.display = 'block';
  document.getElementById('foodItems').value = '';
  document.getElementById('kcalInput').value = '';
  currentImgBase64 = null;
}
function closeAddModal() { document.getElementById('addOverlay').classList.remove('open'); }

function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const dataUrl = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = dataUrl; img.style.display = 'block';
    document.getElementById('uploadHint').style.display = 'none';
    currentImgBase64 = dataUrl.split(',')[1];
    if (apiKey) analyzeImage(currentImgBase64, dataUrl.split(';')[0].split(':')[1]);
  };
  reader.readAsDataURL(file);
}

async function analyzeImage(base64, mimeType) {
  if (!apiKey) return;
  const analyzingEl = document.getElementById('analyzing');
  analyzingEl.textContent = 'AI 识别中，请稍候...';
  analyzingEl.style.color = 'var(--text3)';
  analyzingEl.style.display = 'block';
  document.getElementById('submitBtn').disabled = true;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: mimeType || 'image/jpeg', data: base64 } },
            { text: '请识别图中的食物，用中文回答。格式：{"foods":["食物1","食物2"],"kcal":估算总卡路里数字}，只返回JSON，不要其他文字。' }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      document.getElementById('foodItems').value = (parsed.foods || []).join(', ');
      document.getElementById('kcalInput').value = parsed.kcal || '';
    }
  } catch(e) {
    console.error(e);
    document.getElementById('analyzing').textContent = 'AI 识别失败，请手动填写或检查 API Key。';
    document.getElementById('analyzing').style.color = 'var(--danger)';
  }
  document.getElementById('analyzing').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
}

function submitMeal() {
  const mealType = document.getElementById('mealType').value;
  const foodStr = document.getElementById('foodItems').value.trim();
  const kcalStr = document.getElementById('kcalInput').value.trim();
  if (!foodStr || !kcalStr) { alert('请填写食物和卡路里'); return; }
  const foods = foodStr.split(/[,，]+/).map(s=>s.trim()).filter(Boolean);
  const kcal = parseInt(kcalStr);
  if (!kcal || kcal <= 0) { alert('卡路里格式不正确'); return; }
  const record = {
    id: Date.now().toString(),
    date: todayStr(),
    mealType, foods, kcal,
    imgUrl: currentImgBase64 ? 'data:image/jpeg;base64,' + currentImgBase64 : null,
    time: new Date().toTimeString().slice(0,5)
  };
  // Store img separately to save space if large
  if (record.imgUrl && record.imgUrl.length > 200000) {
    // Keep small preview only
    record.imgUrl = document.getElementById('previewImg').src;
  }
  records.push(record);
  localStorage.setItem('calorie_records', JSON.stringify(records));
  closeAddModal();
  render();
}

// ── Go ──
render();
</script>
